plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def facebookAppId = System.getenv("FACEBOOK_APP_ID") ?: (project.findProperty("FACEBOOK_APP_ID") ?: "")
def facebookClientToken = System.getenv("FACEBOOK_CLIENT_TOKEN") ?: (project.findProperty("FACEBOOK_CLIENT_TOKEN") ?: "")

android {
    namespace = "com.lumora.lumora"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.lumora.lumora"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        manifestPlaceholders = [
            applicationName: "io.flutter.app.FlutterApplication",
            facebookAppId: facebookAppId,
            facebookClientToken: facebookClientToken,
        ]
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = variant.buildType.name == "release" ? "lumora.apk" : "lumora-${variant.buildType.name}.apk"
        }
    }
}

flutter {
    source = "../.."
}

if (file("google-services.json").exists()) {
    apply plugin: "com.google.gms.google-services"
}
